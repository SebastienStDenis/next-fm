<!doctype html>
<meta charset="utf-8" />
<title>next.fm avatar</title>
<style>
  html,
  body {
    margin: 0;
    background: #000;
  }
  canvas {
    display: block;
  }
</style>
<canvas id="c"></canvas>
<script>
  // Renders one next.fm bot-account avatar. Query params:
  //   mode=light|dark   which side of the palette
  //   art=grille|wave   still grille, or a wavefront caught crossing it
  //   size=<px>         output edge length (default 1024)
  // The wave geometry below (ox, oy, r, sigma, amp, boost) is overridable by
  // query param too, which is how the framing was chosen.
  // The palette values mirror the tokens in frontend/src/app/globals.css; when
  // those change, re-derive here and regenerate.
  const params = new URLSearchParams(location.search);
  const mode = params.get("mode") === "dark" ? "dark" : "light";
  const art = params.get("art") === "wave" ? "wave" : "grille";
  const SIZE = Number(params.get("size") || 1024);
  const num = (key, fallback) =>
    params.has(key) ? Number(params.get(key)) : fallback;

  const PALETTE = {
    light: {
      background: "oklch(0.972 0.006 75)",
      primary: "oklch(0.44 0.055 45)",
    },
    dark: {
      background: "oklch(0.17 0.012 50)",
      primary: "oklch(0.76 0.072 70)",
    },
  }[mode];

  // Proportions of the canvas edge, so any size renders identically.
  const CAP_RATIO = 0.54; // N cap height
  const WEIGHT = 560;
  const COLUMNS = 18; // grille perforations across the edge
  const DOT_ALPHA = 0.17;
  const DOT_RADIUS = 0.0032;

  // The wavefront, frozen. Fired from the bottom-left and caught partway
  // across: it enters at the upper left, passes behind the mark, and re-emerges
  // lower right, leaving the origin corner settled. Centring it instead rings
  // the mark like a target, which is why the origin sits off in a corner.
  // `sigma` is the front's thickness and has to stay well above the grid pitch
  // (1 / COLUMNS), or a single row of perforations lights up and aliases into
  // scatter instead of a swell. Unlike the live field in soundwave-dots.tsx
  // this carries no distance decay: the avatar is one still frame, so the front
  // has to hold on its own.
  const WAVE = {
    ox: num("ox", 0.14),
    oy: num("oy", 0.86),
    r: num("r", 0.62),
    sigma: num("sigma", 0.11),
    amp: num("amp", 0.03),
    boost: num("boost", 0.34),
  };

  const canvas = document.getElementById("c");
  canvas.width = SIZE;
  canvas.height = SIZE;
  canvas.style.width = SIZE + "px";
  canvas.style.height = SIZE + "px";
  const ctx = canvas.getContext("2d");

  // The champagne metal grille of the headphones the palette is modeled on: an
  // even perforation field, quiet enough that it reads as material rather than
  // pattern, and collapses to a soft tint once the avatar is scaled down. With
  // `wave`, the front pushes each perforation outward and brightens it, the
  // same displacement the live landing-page field uses.
  const drawGrille = (wave) => {
    const gap = SIZE / COLUMNS;
    const ox = WAVE.ox * SIZE;
    const oy = WAVE.oy * SIZE;
    const ring = WAVE.r * SIZE;
    const sigma = WAVE.sigma * SIZE;
    const amp = WAVE.amp * SIZE;
    ctx.fillStyle = PALETTE.primary;
    for (let y = gap / 2; y < SIZE; y += gap) {
      for (let x = gap / 2; x < SIZE; x += gap) {
        let energy = 0;
        let px = x;
        let py = y;
        if (wave) {
          const dx = x - ox;
          const dy = y - oy;
          const dist = Math.hypot(dx, dy) || 1;
          const offset = dist - ring;
          energy = Math.exp(-(offset * offset) / (2 * sigma * sigma));
          px += (dx / dist) * energy * amp;
          py += (dy / dist) * energy * amp;
        }
        ctx.globalAlpha = DOT_ALPHA + energy * WAVE.boost;
        ctx.beginPath();
        ctx.arc(px, py, DOT_RADIUS * SIZE * (1 + energy * 0.7), 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  };

  // Centers on the N's own ink rather than its em box, which sits low.
  const drawMark = () => {
    let fontSize = SIZE;
    ctx.font = `${WEIGHT} ${fontSize}px Geist`;
    const probe = ctx.measureText("N");
    const capAtProbe = probe.actualBoundingBoxAscent + probe.actualBoundingBoxDescent;
    fontSize = (CAP_RATIO * SIZE * fontSize) / capAtProbe;

    ctx.font = `${WEIGHT} ${fontSize}px Geist`;
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";
    const m = ctx.measureText("N");
    const inkCenter = (m.actualBoundingBoxDescent - m.actualBoundingBoxAscent) / 2;
    ctx.fillStyle = PALETTE.primary;
    ctx.fillText("N", SIZE / 2, SIZE / 2 - inkCenter);
  };

  const render = () => {
    ctx.fillStyle = PALETTE.background;
    ctx.fillRect(0, 0, SIZE, SIZE);
    drawGrille(art === "wave");
    drawMark();
    document.title = "ready";
  };

  const font = new FontFace("Geist", "url(geist-latin.woff2) format('woff2')", {
    weight: "100 900",
  });
  font.load().then((loaded) => {
    document.fonts.add(loaded);
    render();
  });
</script>
