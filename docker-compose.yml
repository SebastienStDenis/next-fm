services:
  api:
    build: ./backend
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@host.docker.internal:54322/postgres
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-user-sync}
      TEMPORAL_API_KEY: ${TEMPORAL_API_KEY:-}
      LASTFM_API_KEY: ${LASTFM_API_KEY:?set in .env}
      BANDSINTOWN_API_KEY: ${BANDSINTOWN_API_KEY:?set in .env}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:?set in .env}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:?set in .env}
      SPOTIFY_REFRESH_TOKEN: ${SPOTIFY_REFRESH_TOKEN:?set in .env}
      SUPABASE_URL: http://host.docker.internal:54321
      SUPABASE_ISSUER: http://127.0.0.1:54321/auth/v1
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/cli:/app/cli
      - ./backend/migrations:/app/migrations
      - ./backend/tests:/app/tests
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build: ./frontend
    environment:
      API_URL: http://api:8000
      NEXT_PUBLIC_SUPABASE_URL: http://host.docker.internal:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api

  temporal:
    image: temporalio/temporal:1.7.2
    # Run as root so the dev server can create its SQLite file on the
    # root-owned named volume (dev-only; production is Temporal Cloud).
    user: root
    command: server start-dev --ip 0.0.0.0 --db-filename /data/temporal.db
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
      - "${TEMPORAL_UI_PORT:-8080}:8233"
    volumes:
      - temporal-data:/data
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 2s
      timeout: 5s
      retries: 15

  worker:
    build: ./backend
    # watchfiles restarts the worker on code edits, standing in for uvicorn's --reload
    command: >
      sh -c "uv run watchfiles --filter python 'python -m app.worker' app"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@host.docker.internal:54322/postgres
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-user-sync}
      TEMPORAL_API_KEY: ${TEMPORAL_API_KEY:-}
      NIGHTLY_SYNC_ENABLED: ${NIGHTLY_SYNC_ENABLED:-false}
      LASTFM_API_KEY: ${LASTFM_API_KEY:?set in .env}
      BANDSINTOWN_API_KEY: ${BANDSINTOWN_API_KEY:?set in .env}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:?set in .env}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:?set in .env}
      SPOTIFY_REFRESH_TOKEN: ${SPOTIFY_REFRESH_TOKEN:?set in .env}
    volumes:
      - ./backend/app:/app/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      temporal:
        condition: service_healthy

volumes:
  temporal-data:
