services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      # -h forces a TCP check; the socket also answers during initdb, before TCP is up
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d app"]
      interval: 2s
      timeout: 3s
      retries: 15

  api:
    build: ./backend
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run python -m app.seed &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/app
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/tests:/app/tests
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    environment:
      API_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api

volumes:
  pgdata:
