services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      # -h forces a TCP check; the socket also answers during initdb, before TCP is up
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d app"]
      interval: 2s
      timeout: 3s
      retries: 15

  api:
    build: ./backend
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run python -m app.seed &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app}
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-user-sync}
      TEMPORAL_API_KEY: ${TEMPORAL_API_KEY:-}
      LASTFM_API_KEY: ${LASTFM_API_KEY:?set in .env}
      BANDSINTOWN_API_KEY: ${BANDSINTOWN_API_KEY:?set in .env}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:?set in .env}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:?set in .env}
      SPOTIFY_REFRESH_TOKEN: ${SPOTIFY_REFRESH_TOKEN:?set in .env}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/tests:/app/tests
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    environment:
      API_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api

  temporal:
    image: temporalio/auto-setup:1.29.7
    # The dev server can fatal on boot (ringpop tries to rejoin the previous
    # container's stale IP) and would otherwise stay down until started by hand.
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-postgres}
      DEFAULT_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      DEFAULT_NAMESPACE_RETENTION: 168h
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    healthcheck:
      # Healthy only once auto-setup has registered the namespace, which on a
      # fresh database happens minutes after gRPC starts answering. The server
      # binds to the container IP, not loopback, so dial via the service name.
      test: ["CMD-SHELL", "temporal operator namespace describe -n ${TEMPORAL_NAMESPACE:-default} --address temporal:7233 >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.51.1
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"
    depends_on:
      - temporal

  worker:
    build: ./backend
    # watchfiles restarts the worker on code edits, standing in for uvicorn's --reload
    command: >
      sh -c "uv run watchfiles --filter python 'python -m app.worker' app"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app}
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-user-sync}
      TEMPORAL_API_KEY: ${TEMPORAL_API_KEY:-}
      LASTFM_API_KEY: ${LASTFM_API_KEY:?set in .env}
      BANDSINTOWN_API_KEY: ${BANDSINTOWN_API_KEY:?set in .env}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:?set in .env}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:?set in .env}
      SPOTIFY_REFRESH_TOKEN: ${SPOTIFY_REFRESH_TOKEN:?set in .env}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_healthy

volumes:
  pgdata:
