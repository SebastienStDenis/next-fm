# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "next-fm"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# The database major version to use. This has to be the same as your remote
# database's. Run `SHOW server_version;` on the remote database to check.
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false

[realtime]
enabled = false

[edge_runtime]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# The confirmation link points at the frontend's /auth/confirm route (token-hash
# flow), which verifies the OTP server-side and sets the session cookies. Locally
# the mail is captured by Mailpit (http://127.0.0.1:54324); production needs a
# custom SMTP provider (the built-in sender allows only a few emails/hour).
[auth.email.template.confirmation]
# The template writes "Next.fm" as Next&zwnj;.fm to stop mail clients from
# auto-linking the .fm TLD. Headers are plain text, so if the subject (or the
# SMTP sender name) ever gets linkified too, HTML entities won't help: embed a
# literal U+200C via a TOML escape instead ("Confirm your email for
# Next\u200C.fm"). Caveat: some spam filters treat zero-width characters in
# headers as an obfuscation signal, so only do it if it's actually needed.
subject = "Confirm your email for Next.fm"
content_path = "./supabase/templates/confirmation.html"
